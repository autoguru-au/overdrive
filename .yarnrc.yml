compressionLevel: mixed

enableGlobalCache: true

nodeLinker: node-modules

# Exempt @autoguru/icons from the npm minimum-age quarantine so a freshly
# published internal version can be installed (scoped to just this package
# rather than the whole @autoguru/* scope to keep the trust surface minimal).
npmPreapprovedPackages:
  - "@autoguru/icons"

yarnPath: .yarn/releases/yarn-4.15.0.cjs
